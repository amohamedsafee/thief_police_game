name: thief_police_game
description: Real-time location-based multiplayer game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.4
  google_maps_flutter: ^2.4.0
  latlong2: ^0.9.0
  geolocator: ^13.0.2
  geolocator_android: ^4.4.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  vibration: ^2.0.0
  flutter_compass: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false